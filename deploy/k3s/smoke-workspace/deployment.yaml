apiVersion: apps/v1
kind: Deployment
metadata:
  name: smoke-workspace
  namespace: nova-edge
  labels:
    app.kubernetes.io/name: smoke-workspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smoke-workspace
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smoke-workspace
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:1.0.0
          args:
            - -listen=:3000
            - -text=smoke workspace ok
          ports:
            - containerPort: 3000
              name: http
