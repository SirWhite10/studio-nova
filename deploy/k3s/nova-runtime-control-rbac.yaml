apiVersion: v1
kind: Namespace
metadata:
  name: nova-runtime-control
  labels:
    app.kubernetes.io/name: nova-runtime-control
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nova-runtime-control
  namespace: nova-runtime-control
  labels:
    app.kubernetes.io/name: nova-runtime-control
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nova-runtime-control
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/exec
      - configmaps
      - secrets
      - persistentvolumeclaims
      - services
      - namespaces
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups: [""]
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nova-runtime-control
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nova-runtime-control
subjects:
  - kind: ServiceAccount
    name: nova-runtime-control
    namespace: nova-runtime-control
