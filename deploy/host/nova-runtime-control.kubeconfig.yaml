apiVersion: v1
kind: Config
clusters:
  - name: k3s
    cluster:
      server: https://127.0.0.1:6443
      certificate-authority-data: BASE64_ENCODED_CLUSTER_CA
users:
  - name: nova-runtime-control
    user:
      token: SERVICE_ACCOUNT_BEARER_TOKEN
contexts:
  - name: nova-runtime-control@k3s
    context:
      cluster: k3s
      namespace: nova-runtime-control
      user: nova-runtime-control
current-context: nova-runtime-control@k3s
